name: Docs preview
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    secrets:
      DOCS_REPO_TOKEN:
        required: true
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout relationalai-docs
        uses: actions/checkout@v4
        with:
          repository: relationalai/relationalai-docs
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: relationalai-docs

      - name: Install relationalai-docs deps and sync templates
        working-directory: relationalai-docs
        env:
          PRIVATE: true
          RAI_TEMPLATES_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          RAI_TEMPLATES_REPO_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          npm install
          npm run templates:sync

      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: relationalai-docs
        run: |
          vercel pull --yes --environment=private --token="$VERCEL_TOKEN"

      - name: Export pulled Vercel env for deploy
        id: vercel-pulled-env
        shell: bash
        run: |
          set -euo pipefail
          env_file="relationalai-docs/.vercel/.env.private.local"
          if [[ ! -f "$env_file" ]]; then
            echo "Expected Vercel env file not found: $env_file" >&2
            ls -la relationalai-docs/.vercel || true
            exit 1
          fi

          # IMPORTANT: `aldenquimby/deploy-to-vercel-action@v2` parses BUILD_ENV/ENV as an
          # "array" input by splitting on newlines *and commas*. That means passing
          # KEY=VALUE lines breaks whenever VALUE contains a comma (e.g. v1.0a5,v1.0a6).
          #
          # Workaround:
          # - Export key/value pairs into $GITHUB_ENV so they exist in the runner env.
          # - Pass only the variable *names* (keys) to the action, so Vercel CLI reads
          #   values from the environment.

          action_env_lines="$(
            while IFS= read -r line || [[ -n "$line" ]]; do
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ "$line" =~ ^[[:space:]]*$ ]] && continue
              # Optional leading export
              line="${line#export }"
              printf '%s\n' "$line"
            done < "$env_file"
          )"

          env_keys="$(
            echo "$action_env_lines" \
              | awk -F= 'NF>=2 {print $1}' \
              | sed -E 's/[[:space:]]+$//' \
              | sort -u
          )"

          # Parse dotenv into key/value for $GITHUB_ENV.
          # Note: We intentionally *unquote* values here; GitHub won't interpret quotes.
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ "$line" =~ ^[[:space:]]*$ ]] && continue
            line="${line#export }"

            key="${line%%=*}"
            val="${line#*=}"

            if [[ ${#val} -ge 2 && "$val" == \"*\" ]]; then
              val="${val:1:${#val}-2}"
              val="${val//\\\"/\"}"
              val="${val//\\\\/\\}"
            elif [[ ${#val} -ge 2 && "$val" == \'*\' ]]; then
              val="${val:1:${#val}-2}"
            fi

            {
              echo "${key}<<__VercelEnvEOF__"
              echo "${val}"
              echo "__VercelEnvEOF__"
            } >> "$GITHUB_ENV"
          done < "$env_file"

          # CI-safe debug: print which keys were loaded (never values).
          echo "Loaded environment variables from $env_file:" >&2
          echo "$env_keys" | awk '{print "- " $0}' >&2

          count="$(echo "$env_keys" | wc -l | tr -d ' ')"
          echo "Total vars loaded: $count" >&2
          {
            echo "keys<<EOF"
            echo "$env_keys"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy Private Preview to Vercel
        uses: aldenquimby/deploy-to-vercel-action@v2
        id: vercel-deploy
        if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
        env:
          RAI_TEMPLATES_REPO_BRANCH: ${{ github.head_ref || github.ref_name }}
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          CREATE_COMMENT: false
          PRODUCTION: false
          WORKING_DIRECTORY: relationalai-docs
          BUILD_ENV: |
            ${{ steps.vercel-pulled-env.outputs.keys }}
            RAI_TEMPLATES_REPO_BRANCH
          ENV: |
            ${{ steps.vercel-pulled-env.outputs.keys }}
            RAI_TEMPLATES_REPO_BRANCH
      - uses: phulsechinmay/rewritable-pr-comment@v0.3.0
        if: ${{ steps.vercel-deploy.outputs.DEPLOYMENT_CREATED }}
        with:
          message: |
            The docs preview for this pull request has been deployed to Vercel!

            <table>
              <tr>
                <td><strong>✅ Preview:</strong></td>
                <td><a href='${{ steps.vercel-deploy.outputs.PREVIEW_URL }}/early-access/pyrel/templates'>${{ steps.vercel-deploy.outputs.PREVIEW_URL }}/early-access/pyrel/templates</a></td>
              </tr>
              <tr>
                <td><strong>🔍 Inspect:</strong></td>
                <td><a href='${{ steps.vercel-deploy.outputs.DEPLOYMENT_INSPECTOR_URL }}'>${{ steps.vercel-deploy.outputs.DEPLOYMENT_INSPECTOR_URL }}</a></td>
              </tr>
            </table>
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_IDENTIFIER: 'docs-preview-comment'
