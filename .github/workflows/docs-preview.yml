name: Docs preview
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    secrets:
      DOCS_REPO_TOKEN:
        required: true
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=private --token="$VERCEL_TOKEN"

      - name: Export pulled Vercel env for deploy
        id: vercel-pulled-env
        shell: bash
        run: |
          set -euo pipefail
          env_file=".vercel/.env.private.local"
          if [[ ! -f "$env_file" ]]; then
            echo "Expected Vercel env file not found: $env_file" >&2
            ls -la .vercel || true
            exit 1
          fi

          # Convert dotenv-style lines into plain KEY=VALUE lines for GitHub Actions.
          # GitHub Actions does NOT interpret quotes in $GITHUB_ENV, so a line like
          # FOO="123" would set the literal value "123". Strip enclosing quotes.
          normalized="$(
            line=''
            while :; do
              IFS= read -r line || { [[ -n "$line" ]] || break; }
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ "$line" =~ ^[[:space:]]*$ ]] && continue

              # Optional leading export
              line="${line#export }"

              key="${line%%=*}"
              val="${line#*=}"

              # Strip surrounding quotes (common in .env files)
              if [[ ${#val} -ge 2 && "$val" == \"*\" ]]; then
                val="${val:1:${#val}-2}"
                val="${val//\\\"/\"}"
                val="${val//\\\\/\\}"
              elif [[ ${#val} -ge 2 && "$val" == \'*\' ]]; then
                val="${val:1:${#val}-2}"
              fi

              printf '%s=%s\n' "$key" "$val"
            done < "$env_file"
          )"

          # Export to the job environment so subsequent steps (and the deploy action)
          # can access expected variables.
          echo "$normalized" >> "$GITHUB_ENV"

          # CI-safe debug: print which keys were loaded (never values).
          echo "Loaded environment variables from $env_file:" >&2
          echo "$normalized" \
            | sed -E 's/^export[[:space:]]+//' \
            | awk -F= 'NF>=2 {print $1}' \
            | sed -E 's/[[:space:]]+$//' \
            | sort -u \
            | awk '{print "- " $0}' >&2

          count="$(echo "$normalized" | awk -F= 'NF>=2 {print $1}' | wc -l | tr -d ' ')"
          echo "Total vars loaded: $count" >&2
          {
            echo "env<<EOF"
            echo "$normalized"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout relationalai-docs
        uses: actions/checkout@v4
        with:
          repository: relationalai/relationalai-docs
          ref: private
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: relationalai-docs

      - name: Deploy Private Preview to Vercel
        uses: aldenquimby/deploy-to-vercel-action@v2
        id: vercel-deploy
        if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          CREATE_COMMENT: false
          PRODUCTION: false
          WORKING_DIRECTORY: relationalai-docs
          BUILD_ENV: |
            ${{ steps.vercel-pulled-env.outputs.env }}
            RAI_TEMPLATES_REPO_BRANCH=${{ github.head_ref || github.ref_name }}
          ENV: ${{ steps.vercel-pulled-env.outputs.env }}
      - uses: phulsechinmay/rewritable-pr-comment@v0.3.0
        if: ${{ steps.vercel-deploy.outputs.DEPLOYMENT_CREATED }}
        with:
          message: |
            The docs preview for this pull request has been deployed to Vercel!

            <table>
              <tr>
                <td><strong>✅ Preview:</strong></td>
                <td><a href='${{ steps.vercel-deploy.outputs.PREVIEW_URL }}'>${{ steps.vercel-deploy.outputs.PREVIEW_URL }}</a></td>
              </tr>
              <tr>
                <td><strong>🔍 Inspect:</strong></td>
                <td><a href='${{ steps.vercel-deploy.outputs.DEPLOYMENT_INSPECTOR_URL }}'>${{ steps.vercel-deploy.outputs.DEPLOYMENT_INSPECTOR_URL }}</a></td>
              </tr>
            </table>
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_IDENTIFIER: 'docs-preview-comment'
